<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LogMeal — Candidate Frontend - David Riobo Cicero</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body style="font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto;">
  <h1>Candidate Frontend - David Riobo Cicero</h1>
  <p>Upload, list and analyse your images</p>
  <section>
    <h2>Upload</h2>
     <form id="uploadForm">
      <input type="file" id="imageFile" accept="image/*" required>
      <button type="submit">Upload Image</button>
    </form>
    <div id="uploadResult"></div>
  </section>

  <section>
    <h2>List & Share</h2>
    <!-- Add listing and share link UI -->
    <button id="refreshBtn">Refresh List</button>
    <div id="imageList"></div>
  </section>

  <section>
    <h2>Analyse</h2>
    <!-- Add analyse UI -->
     <h2>Analyse</h2>
    <select id="analyseSelect">
      <option value="">Select an image...</option>
    </select>
    <button id="analyseBtn">Analyse Image</button>
    <div id="analysisResult"></div>
  </section>

  <script src="/script.js"></script>
</body>
</html>
